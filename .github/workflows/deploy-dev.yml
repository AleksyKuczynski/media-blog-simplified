name: Deploy DEV

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        working-directory: ./frontend
        run: |
          docker build --no-cache \
            --build-arg NEXT_PUBLIC_DIRECTUS_URL=https://cms.event4me.vip \
            --build-arg DIRECTUS_URL=https://cms.event4me.vip \
            --build-arg DEV_ARTICLE_LIMIT=9 \
            --build-arg NEXT_PUBLIC_SITE_URL=https://dev.event4me.vip \
            --build-arg NEXT_PUBLIC_GA_MEASUREMENT_ID=${{ secrets.GA_MEASUREMENT_ID }} \
            --build-arg NEXT_PUBLIC_YANDEX_METRIKA_ID=${{ secrets.YANDEX_METRIKA_ID }} \
            -t event4me-dev:latest .

      - name: Restart container
        run: |
          docker compose -f /opt/event4me/dev/docker-compose.yml --env-file /opt/event4me/dev/.env up -d --force-recreate